<section id="$idprefix$title-slide"$for(title-slide-attributes/pairs)$ $it.key$="$it.value$"$endfor$>
  <div style="display: flex; align-items: flex-end; justify-content: space-between;">
    <h1 class="title" style="color: #ffffff; font-size: 7.5rem; line-height: 1; text-align: left; padding-bottom: 0; margin: 0;"><span style="color: #ffd000; text-transform: lowercase;">logolink</span><br>NetLogo<br>no R</h1>
    <div style="text-align: right; padding-bottom: 4px;">
$for(author)$
      <p class="author" style="font-size: 0.75em; margin: 0;">$author$</p>
$endfor$
$if(date)$
      <p class="date" style="font-size: 0.75em; margin: 0;">$date$</p>
$endif$
    </div>
  </div>
</section>
